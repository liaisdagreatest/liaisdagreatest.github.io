<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Epstein's Island</title>
    <link rel="icon" type="image/x-icon" href="https://image2url.com/r2/default/images/1772555222158-d47e3bf4-ef4b-4234-b90f-9ab089fa996c.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800&family=Space+Mono&display=swap" rel="stylesheet">

    <style id="mainTheme">
        :root {
            --accent-color: #a60000;
            --glow-color: #fc0303;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        /* This will be injected via JS when Israel is selected */
        .blue-theme {
            --accent-color: #005eb8 !important;
            --glow-color: #00c6ff !important;
        }

        body {
            background-color: #050000; 
            background-image: url('https://media-cldnry.s-nbcnews.com/image/upload/newscms/2019_31/2951151/190729-jeffrey-epstein-island-drone-temple-2-ew-505p.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--accent-color);
            font-family: 'Space Mono', monospace;
            overflow: hidden;
            transition: background-image 0.5s ease-in-out, color 0.5s ease; 
        }

        /* Scanner line color also follows the theme */
        body::after {
            content: "";
            position: fixed;
            top: -100px;
            left: 0;
            width: 100%;
            height: 5px;
            background: var(--glow-color);
            opacity: 0.2;
            box-shadow: 0 0 15px var(--glow-color);
            z-index: 500;
            pointer-events: none;
            animation: scan 6s linear infinite;
        }

        @keyframes scan {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.1) 0%, rgba(0,0,0,0.85) 100%);
            z-index: -1;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-family: 'Inter', sans-serif;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 30px;
            letter-spacing: -2px;
            text-align: center;
            animation: glow 3s ease-in-out infinite alternate;
            z-index: 10;
            transition: text-shadow 0.5s ease;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #000, 0 0 15px var(--glow-color); }
            to { text-shadow: 0 0 20px #000, 0 0 35px var(--glow-color); }
        }

        .modal {
            display: none; 
            position: fixed;
            z-index: 2000;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85);
            backdrop-filter: blur(15px);
        }

        .modal-content {
            background: rgba(10, 10, 10, 0.95);
            margin: 10% auto;
            padding: 35px;
            border: 1px solid var(--glow-color);
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.5);
            position: relative;
            transition: border 0.5s ease;
        }

        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 20px 0;
            color: white;
            text-align: left;
        }

        select {
            width: 100%;
            padding: 12px;
            background: #111;
            color: white;
            border: 1px solid var(--glow-color);
            border-radius: 8px;
            font-family: 'Space Mono', monospace;
            outline: none;
        }

        .btn {
            padding: 18px 40px;
            font-size: 1.1rem;
            background: var(--glass);
            color: white;
            border-radius: 50px;
            cursor: pointer;
            text-decoration: none;
            transition: 0.4s;
            backdrop-filter: blur(12px);
            border: 1px solid var(--glow-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 10;
        }

        .btn:hover { background: white; color: black; transform: scale(1.05); }

        .sidebar {
            position: fixed;
            left: -300px; top: 0; width: 280px; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(25px);
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding-top: 100px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            border-right: 1px solid var(--glow-color);
        }

        .sidebar.active { left: 0; }

        .sidebar a {
            padding: 15px 25px;
            text-decoration: none;
            color: white;
            width: 70%;
            text-align: center;
            margin-bottom: 20px;
            background: var(--glass);
            border-radius: 8px;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .sidebar a:hover { 
            background: var(--accent-color); 
            border-color: var(--glow-color);
            transform: translateX(10px); 
        }

        .menu-icon { position: fixed; top: 30px; left: 30px; z-index: 1100; cursor: pointer; }
        .menu-icon div { width: 30px; height: 2px; background-color: white; margin: 6px 0; transition: 0.4s; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; z-index: 900; }
    </style>
</head>
<body id="mainBody">

<div id="overlay" onclick="toggleMenu()"></div>

<div id="settingsModal" class="modal">
    <div class="modal-content">
        <h2 style="font-family: 'Inter'; color: white; margin-top: 0;">TERMINAL CONFIG</h2>
        
        <div class="setting-item">
            <label>SATELLITE VIEW</label>
            <select id="bgSelector" onchange="changeWallpaper(this.value)">
                <option value="https://media-cldnry.s-nbcnews.com/image/upload/newscms/2019_31/2951151/190729-jeffrey-epstein-island-drone-temple-2-ew-505p.jpg">The Temple (Default)</option>
                <option value="https://image2url.com/r2/default/images/1772486303978-75f9d582-5353-47e9-aa09-7f14048e3cd6.png">Epstein</option>
                <option value="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/EFTA00001459_-_Large_painting_of_Bill_Clinton_in_a_blue_dress_hangs_on_the_wall_next_to_a_desk_with_tools_and_supplies.jpg/960px-EFTA00001459_-_Large_painting_of_Bill_Clinton_in_a_blue_dress_hangs_on_the_wall_next_to_a_desk_with_tools_and_supplies.jpg">Bill Clinton</option>
                <option value="https://ichef.bbci.co.uk/ace/standard/976/cpsprodpb/4E2B/production/_107811002_gettyimages-700334384.jpg">Jeff & Friends</option>
                <option value="https://upload.wikimedia.org/wikipedia/commons/d/d4/Flag_of_Israel.svg">Israel</option>
            </select>
        </div>

        <div class="setting-item" style="flex-direction: row; justify-content: space-between;">
            <label>SCANNER OVERLAY</label>
            <input type="checkbox" id="scannerToggle" checked onchange="toggleScanner(this.checked)">
        </div>

        <button class="btn" style="font-size: 0.8rem; padding: 10px 25px; width: 100%;" onclick="toggleSettings()">Confirm</button>
    </div>
</div>

<div class="menu-icon" id="menu-icon" onclick="toggleMenu()">
    <div class="bar1"></div><div class="bar2"></div><div class="bar3"></div>
</div>

<nav class="sidebar" id="sidebar">
    <a href="#">The Registry</a>
    <a href="#">Private Vault</a>
    <a href="#" onclick="toggleSettings()">System Settings</a>
</nav>

<h1>Epstein's Island</h1>
<a href="https://solarhubv2.vercel.app" class="btn">Enter Palace</a>

<script>
    const israelFlag = "https://upload.wikimedia.org/wikipedia/commons/d/d4/Flag_of_Israel.svg";
    
    // Preload Logic
    const imagesToPreload = [
        "https://media-cldnry.s-nbcnews.com/image/upload/newscms/2019_31/2951151/190729-jeffrey-epstein-island-drone-temple-2-ew-505p.jpg",
        "https://image2url.com/r2/default/images/1772486303978-75f9d582-5353-47e9-aa09-7f14048e3cd6.png",
        "https://upload.wikimedia.org/wikipedia/commons/thumb/7/7e/EFTA00001459_-_Large_painting_of_Bill_Clinton_in_a_blue_dress_hangs_on_the_wall_next_to_a_desk_with_tools_and_supplies.jpg/960px-EFTA00001459_-_Large_painting_of_Bill_Clinton_in_a_blue_dress_hangs_on_the_wall_next_to_a_desk_with_tools_and_supplies.jpg",
        "https://ichef.bbci.co.uk/ace/standard/976/cpsprodpb/4E2B/production/_107811002_gettyimages-700334384.jpg",
        israelFlag
    ];

    imagesToPreload.forEach(url => { const img = new Image(); img.src = url; });

    function toggleMenu() {
        const sidebar = document.getElementById('sidebar');
        const icon = document.getElementById('menu-icon');
        const overlay = document.getElementById('overlay');
        sidebar.classList.toggle('active');
        icon.classList.toggle('open');
        overlay.style.display = sidebar.classList.contains('active') ? 'block' : 'none';
    }

    function toggleSettings() {
        const modal = document.getElementById('settingsModal');
        if(document.getElementById('sidebar').classList.contains('active')) toggleMenu();
        modal.style.display = (modal.style.display === "block") ? "none" : "block";
    }

    function changeWallpaper(imageUrl) {
        const body = document.getElementById('mainBody');
        body.style.backgroundImage = `url('${imageUrl}')`;

        // Check if selected is Israel
        if (imageUrl === israelFlag) {
            body.classList.add('blue-theme');
        } else {
            body.classList.remove('blue-theme');
        }
    }

    function toggleScanner(isVisible) {
        const existing = document.getElementById("scannerStyle");
        if (!isVisible) {
            const style = document.createElement('style');
            style.id = "scannerStyle";
            document.head.appendChild(style);
            style.innerHTML = "body::after { display: none; }";
        } else if(existing) {
            existing.remove();
        }
    }

    window.onclick = function(event) {
        const modal = document.getElementById('settingsModal');
        if (event.target == modal) modal.style.display = "none";
    }
</script>

</body>
</html>
